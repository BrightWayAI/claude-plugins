name: Update submodules

on:
  repository_dispatch:
    types: [plugin-updated]
  workflow_dispatch:
    inputs:
      submodule:
        description: "Submodule to update (blank = all)"
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Update submodules
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SUBMODULE="${{ github.event.inputs.submodule }}${{ github.event.client_payload.submodule }}"

          if [ -n "$SUBMODULE" ]; then
            echo "Updating $SUBMODULE"
            git submodule update --remote "$SUBMODULE"
          else
            echo "Updating all submodules"
            git submodule update --remote
          fi

          if git diff --quiet; then
            echo "No submodule changes"
            exit 0
          fi

          git add -A
          CHANGED=$(git diff --cached --name-only | tr '\n' ', ' | sed 's/,$//')
          git commit -m "Update submodules: $CHANGED"
          git push
